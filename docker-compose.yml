services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cookbook}
      POSTGRES_USER: ${POSTGRES_USER:-cookbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cookbook}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cookbook} -d ${POSTGRES_DB:-cookbook}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    build:
      context: ./server
    environment:
      NODE_ENV: ${SERVER_NODE_ENV:-production}
      PORT: ${SERVER_PORT:-3000}
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgres://cookbook:cookbook@postgres:5432/cookbook}
      SQLITE_MIGRATION_SOURCE: ${SQLITE_MIGRATION_SOURCE:-/app/data/recipe-book.db}
      CORS_ORIGIN: ${APP_ORIGIN:-http://localhost}
      BETTER_AUTH_URL: ${APP_ORIGIN:-http://localhost}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-in-production}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    volumes:
      - server_data:/app/data
    expose:
      - "${SERVER_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  client:
    build:
      context: ./client
    environment:
      NODE_ENV: ${CLIENT_NODE_ENV:-production}
      PORT: ${CLIENT_PORT:-3001}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://server:3000}
      PROTOCOL_HEADER: ${PROTOCOL_HEADER:-x-forwarded-proto}
      HOST_HEADER: ${HOST_HEADER:-x-forwarded-host}
      ORIGIN: ${APP_ORIGIN:-http://localhost}
    expose:
      - "${CLIENT_PORT:-3001}"
    depends_on:
      server:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-http://localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      client:
        condition: service_started
      server:
        condition: service_healthy

volumes:
  postgres_data:
  server_data:
  caddy_data:
  caddy_config:
