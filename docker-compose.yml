services:
  server:
    build:
      context: ./server
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_FILE: /app/data/recipe-book.db
      CORS_ORIGIN: http://localhost
      BETTER_AUTH_URL: http://localhost
      BETTER_AUTH_SECRET: change-me-in-production
      ADMIN_EMAILS: ""
    volumes:
      - server_data:/app/data
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  client:
    build:
      context: ./client
    environment:
      NODE_ENV: production
      PORT: 3001
      PUBLIC_API_BASE_URL: ""
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      ORIGIN: http://localhost
    expose:
      - "3001"
    depends_on:
      server:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    environment:
      CADDY_SITE_ADDRESS: http://localhost
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      client:
        condition: service_started
      server:
        condition: service_healthy

volumes:
  server_data:
  caddy_data:
  caddy_config:
